# 运营配置文件
SignIn:
  # 每日签到经验奖励范围
  ExpMin: 5    # 最小经验奖励
  ExpMax: 20   # 最大经验奖励
  
  # 连续签到经验倍增配置
  ContinuousBonus:
    # 连续签到天数 -> 经验倍数映射
    3: 1.2    # 连续3天，经验1.2倍
    7: 1.5    # 连续7天，经验1.5倍
    15: 2.0   # 连续15天，经验2.0倍
    30: 3.0   # 连续30天，经验3.0倍
    
  # 签到排行配置
  Ranking:
    MaxDisplay: 100  # 最大显示排行人数
    CacheExpire: 3600  # 排行缓存过期时间（秒） 