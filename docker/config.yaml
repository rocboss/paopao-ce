    - 127.0.0.1:6379

JWT:
  Secret: 18a6413dc4fe394c66345ebe501b2f26
  Issuer: paopao-api
  Expire: 86400

AdminSettings:
  EncryptionKey: "CHANGE-ME-TO-A-LONG-RANDOM-SECRET"

